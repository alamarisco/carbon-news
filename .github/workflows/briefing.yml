name: CBAM Global Monitor — Weekly Briefing

on:
  # Every Monday 8:30 AM Taipei time (UTC+8) = Monday 00:30 UTC
  schedule:
    - cron: '30 0 * * 1'

  # Trigger manually from GitHub Actions UI (optionally override hours lookback)
  workflow_dispatch:
    inputs:
      hours:
        description: 'Hours lookback (leave blank for default 168 = 7 days)'
        required: false
        default: ''

jobs:
  send-briefing:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Install dependencies
      - name: Install dependencies
        run: pip install -r cbam-monitor/requirements.txt

      # 4. Determine hours lookback
      - name: Set lookback window
        id: window
        run: |
          if [ -n "${{ github.event.inputs.hours }}" ]; then
            echo "HOURS=${{ github.event.inputs.hours }}" >> $GITHUB_OUTPUT
          else
            echo "HOURS=168" >> $GITHUB_OUTPUT
          fi

      # 5. Get current date in Taipei time for subject line
      - name: Get Taipei date
        id: date
        run: echo "DATE=$(TZ='Asia/Taipei' date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      # 6. Fetch articles → JSON
      - name: Fetch news articles
        run: |
          python cbam-monitor/scripts/fetch_feeds.py \
            --hours ${{ steps.window.outputs.HOURS }} \
            --format json \
            --output /tmp/cbam_articles.json

      # 7. Format JSON → HTML newsletter
      - name: Format HTML newsletter
        run: |
          python cbam-monitor/scripts/format_newsletter.py \
            --input /tmp/cbam_articles.json \
            --output /tmp/cbam_newsletter.html

      # 8. Count matched articles for subject line
      - name: Count articles
        id: count
        run: |
          COUNT=$(python -c "import json; data=json.load(open('/tmp/cbam_articles.json')); print(len(data))")
          echo "COUNT=$COUNT" >> $GITHUB_OUTPUT

      # 9. Send via Gmail SMTP
      - name: Send newsletter email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_ADDRESS }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          to: ${{ secrets.RECIPIENT_EMAIL }}
          from: "CBAM Monitor <${{ secrets.GMAIL_ADDRESS }}>"
          subject: "CBAM Global Monitor | 碳邊境調整機制週報 — ${{ steps.date.outputs.DATE }} (${{ steps.count.outputs.COUNT }} articles)"
          html_body: file:///tmp/cbam_newsletter.html
          convert_markdown: false
