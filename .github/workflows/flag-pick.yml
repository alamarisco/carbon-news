name: CBAM Monitor — Flag Pick Ledger

# Triggered by Cowork (or any machine) after a story is picked in FLAG mode.
# Updates state/seen_urls.json so the RADAR won't surface the story again.
#
# Caller fires:
#   curl -X POST \
#     -H "Authorization: Bearer $CBAM_GH_TOKEN" \
#     -H "Content-Type: application/json" \
#     https://api.github.com/repos/alamarisco/carbon-news/dispatches \
#     -d '{"event_type":"flag-pick","client_payload":{"urls":["URL1","URL2"]}}'
#
# CBAM_GH_TOKEN must be a fine-grained PAT with contents:write on this repo.

on:
  repository_dispatch:
    types: [flag-pick]

permissions:
  contents: write

jobs:
  update-ledger:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Append picked URLs to seen_urls.json
        env:
          URLS_JSON: ${{ toJson(github.event.client_payload.urls) }}
        run: python3 radar/scripts/flag_ledger.py state/seen_urls.json "$URLS_JSON"

      - name: Commit & push ledger
        run: |
          git config user.name  "cbam-monitor-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/seen_urls.json
          git diff --cached --quiet && { echo "Nothing to commit"; exit 0; }
          N=$(git diff --cached -- state/seen_urls.json | grep -c '^+.*http' || echo 0)
          git commit -m "flag: ledger += ${N} URL(s)"
          git pull --rebase origin main
          git push
