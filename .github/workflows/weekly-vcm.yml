name: Carbon News — Weekly VCM Digest

# Emails the Stream B (VCM / 廣義碳市場 / carbon-credit) reference digest once a week (Monday).
# Self-contained + email-only: fetches a 7-day window, runs RADAR with ephemeral /tmp state
# (no repo writes), renders Stream B, and emails it. A tiny Actions-cache marker prevents the
# backup slot from double-sending.

on:
  schedule:
    - cron: "23 1 * * 1"    # Monday 09:23 Taipei — primary (off-peak minute)
    - cron: "7 3 * * 1"     # Monday 11:07 Taipei — backup
  workflow_dispatch:
    inputs:
      hours:
        description: "Hours lookback (blank = 168 = 7 days)"
        required: false
        default: ""
  repository_dispatch:
    types: [run-weekly-vcm]

permissions:
  contents: read

concurrency:
  group: weekly-vcm
  cancel-in-progress: false

jobs:
  vcm-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore VCM state
        uses: actions/cache@v4
        with:
          path: .vcmstate
          key: vcm-state-${{ github.run_id }}
          restore-keys: vcm-state-
      - name: Prepare state
        run: |
          mkdir -p .vcmstate
          [ -f .vcmstate/last_emailed.txt ] || echo "none" > .vcmstate/last_emailed.txt

      - name: Determine lookback window
        id: lb
        run: |
          if [ -n "${{ github.event.inputs.hours }}" ]; then
            echo "HOURS=${{ github.event.inputs.hours }}" >> "$GITHUB_OUTPUT"
          else
            echo "HOURS=168" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip if already emailed today
        id: guard
        run: |
          TODAY="$(TZ='Asia/Taipei' date +%F)"
          echo "date=$TODAY" >> "$GITHUB_OUTPUT"
          if [ "${{ github.event_name }}" = "schedule" ] && grep -qx "$TODAY" .vcmstate/last_emailed.txt; then
            echo "Already emailed this week ($TODAY) — skipping backup."
            echo "run=no" >> "$GITHUB_OUTPUT"
          else
            echo "run=yes" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch 7-day window → RADAR → render Stream B
        id: email
        if: steps.guard.outputs.run == 'yes'
        run: |
          mkdir -p /tmp/vcm
          python scripts/fetch_feeds.py --hours ${{ steps.lb.outputs.HOURS }} \
            --format json --output /tmp/vcm/articles.json
          # ephemeral /tmp portal ledger + --maxage 8 (keep the whole week); never touches repo state
          python radar/scripts/radar_process.py \
            --articles /tmp/vcm/articles.json \
            --seen state/seen_urls.json \
            --portal-seen /tmp/vcm/portal_seen.json \
            --outdir /tmp/vcm --date "${{ steps.guard.outputs.date }}" --maxage 8
          if python radar/scripts/render_email.py \
               --candidates /tmp/vcm/candidates.json --date "${{ steps.guard.outputs.date }}" \
               --out /tmp/vcm_email.html --stream b; then
            echo "send=yes" >> "$GITHUB_OUTPUT"
            echo "nb=$(python -c "import json;print(len(json.load(open('/tmp/vcm/candidates.json')).get('stream_b',[])))")" >> "$GITHUB_OUTPUT"
          else
            echo "send=no" >> "$GITHUB_OUTPUT"
          fi

      - name: Email Stream B digest
        id: send
        if: steps.guard.outputs.run == 'yes' && steps.email.outputs.send == 'yes'
        continue-on-error: true
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_ADDRESS }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          to: ${{ secrets.VCM_RECIPIENTS }}
          from: "Carbon News — VCM <${{ secrets.GMAIL_ADDRESS }}>"
          subject: "碳權市場週報 (VCM/廣義碳市場) — ${{ steps.guard.outputs.date }} (${{ steps.email.outputs.nb }} items)"
          html_body: file:///tmp/vcm_email.html
          convert_markdown: false

      - name: Mark emailed
        if: steps.guard.outputs.run == 'yes' && steps.send.outcome == 'success'
        run: echo "${{ steps.guard.outputs.date }}" > .vcmstate/last_emailed.txt
