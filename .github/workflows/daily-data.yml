name: Carbon News — Daily CBAM Digest

# Email-only: fetches, runs RADAR, and emails the Stream A (CBAM core) digest.
# No repo writes — dedup state (portal ledger + last-emailed date) lives in GitHub Actions cache.
# Off-peak odd-minute crons + 2 backups dodge GitHub's peak-hour cron lag/skips.

on:
  schedule:
    - cron: "23 0 * * 1-5"   # 08:23 Taipei — primary
    - cron: "47 1 * * 1-5"   # 09:47 Taipei — backup 1
    - cron: "7 3 * * 1-5"    # 11:07 Taipei — backup 2
    # Monday runs get 72h lookback automatically (see lookback) to catch up the weekend.
  workflow_dispatch:
    inputs:
      hours:
        description: "Hours lookback (blank = auto: 72 on Monday, else 25)"
        required: false
        default: ""
  repository_dispatch:
    types: [run-daily]

permissions:
  contents: read

concurrency:
  group: daily-data
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements.txt

      # Rolling state in Actions cache (keys are immutable → unique key per run + prefix restore).
      - name: Restore radar state
        uses: actions/cache@v4
        with:
          path: .state
          key: radar-state-${{ github.run_id }}
          restore-keys: radar-state-
      - name: Prepare state
        run: |
          mkdir -p .state
          [ -f .state/portal_seen.json ] || echo '{"urls":[]}' > .state/portal_seen.json
          [ -f .state/last_emailed.txt ] || echo "none" > .state/last_emailed.txt

      - name: Determine lookback window
        id: lb
        run: |
          if [ -n "${{ github.event.inputs.hours }}" ]; then
            echo "HOURS=${{ github.event.inputs.hours }}" >> "$GITHUB_OUTPUT"
          elif [ "$(date -u +%u)" = "1" ]; then
            echo "HOURS=72" >> "$GITHUB_OUTPUT"
          else
            echo "HOURS=25" >> "$GITHUB_OUTPUT"
          fi

      # Backups no-op if today's digest already emailed (guard reads cached last-emailed date).
      - name: Skip if already emailed today
        id: guard
        run: |
          TODAY="$(TZ='Asia/Taipei' date +%F)"
          echo "date=$TODAY" >> "$GITHUB_OUTPUT"
          if [ "${{ github.event_name }}" = "schedule" ] && grep -qx "$TODAY" .state/last_emailed.txt; then
            echo "Already emailed today ($TODAY) — skipping."
            echo "run=no" >> "$GITHUB_OUTPUT"
          else
            echo "run=yes" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch → RADAR → render Stream A
        if: steps.guard.outputs.run == 'yes'
        run: |
          mkdir -p /tmp/radar
          python scripts/fetch_feeds.py --hours ${{ steps.lb.outputs.HOURS }} \
            --format json --output /tmp/radar/latest.json
          python radar/scripts/radar_process.py \
            --articles /tmp/radar/latest.json \
            --seen state/seen_urls.json \
            --portal-seen .state/portal_seen.json \
            --outdir /tmp/radar --date "${{ steps.guard.outputs.date }}"
          python radar/scripts/render_email.py \
            --candidates /tmp/radar/candidates.json --date "${{ steps.guard.outputs.date }}" \
            --out /tmp/radar_email.html --stream a
          echo "NA=$(python -c "import json;print(len(json.load(open('/tmp/radar/candidates.json')).get('stream_a',[])))")" >> "$GITHUB_ENV"

      - name: Email CBAM digest
        id: send
        if: steps.guard.outputs.run == 'yes'
        continue-on-error: true   # transient SMTP failure → guard leaves today unmarked, a backup retries
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_ADDRESS }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          to: ${{ secrets.CBAM_RECIPIENTS }}
          from: "Carbon News — CBAM <${{ secrets.GMAIL_ADDRESS }}>"
          subject: "CBAM 每日雷達 — ${{ steps.guard.outputs.date }} (Stream A ${{ env.NA }})"
          html_body: file:///tmp/radar_email.html
          convert_markdown: false

      # Only mark emailed on success → a failed send lets the next backup retry.
      - name: Mark emailed
        if: steps.guard.outputs.run == 'yes' && steps.send.outcome == 'success'
        run: echo "${{ steps.guard.outputs.date }}" > .state/last_emailed.txt
