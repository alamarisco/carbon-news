name: CBAM Monitor — Daily Data Feed

on:
  schedule:
    - cron: "30 0 * * 1-5"   # weekdays 08:30 Taipei — primary
    - cron: "30 1 * * 1-5"   # weekdays 09:30 Taipei — backup 1 (GitHub cron is best-effort)
    - cron: "0 3 * * 1-5"    # weekdays 11:00 Taipei — backup 2
    # Monday's morning run gets 72h automatically (see lookback) to catch up the weekend.
  workflow_dispatch:
    inputs:
      hours:
        description: "Hours lookback (blank = auto: 72 on Monday, else 25)"
        required: false
        default: ""
  repository_dispatch:
    types: [run-daily]

permissions:
  contents: write

concurrency:
  group: daily-data
  cancel-in-progress: false

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Skip backups if already ran today
        id: guard
        run: |
          # Manual / repository_dispatch runs always proceed. Scheduled backups no-op if
          # data/last_run.txt already shows today's Taipei date (the primary run succeeded).
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "run=yes" >> "$GITHUB_OUTPUT"; exit 0
          fi
          TODAY="$(TZ='Asia/Taipei' date +%F)"
          if [ -f data/last_run.txt ] && grep -q "$TODAY" data/last_run.txt; then
            echo "Already ran today ($TODAY) — skipping this scheduled backup."
            echo "run=no" >> "$GITHUB_OUTPUT"
          else
            echo "No run yet today ($TODAY) — proceeding."
            echo "run=yes" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.guard.outputs.run == 'yes'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        if: steps.guard.outputs.run == 'yes'
        run: pip install -r requirements.txt

      - name: Determine lookback window
        id: lb
        if: steps.guard.outputs.run == 'yes'
        run: |
          if [ -n "${{ github.event.inputs.hours }}" ]; then
            echo "HOURS=${{ github.event.inputs.hours }}" >> "$GITHUB_OUTPUT"
          elif [ "$(date -u +%u)" = "1" ]; then
            echo "HOURS=72" >> "$GITHUB_OUTPUT"
          else
            echo "HOURS=25" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch articles → JSON
        if: steps.guard.outputs.run == 'yes'
        run: |
          mkdir -p data
          python scripts/fetch_feeds.py --hours ${{ steps.lb.outputs.HOURS }} --format json --output data/latest.json
          cp data/latest.json "data/$(TZ='Asia/Taipei' date +%Y-%m-%d_%H%M).json"
          ls data/????-??-??_????.json 2>/dev/null | sort -r | tail -n +31 | xargs rm -f || true

      - name: Heartbeat
        if: steps.guard.outputs.run == 'yes'
        run: TZ='Asia/Taipei' date +'%Y-%m-%d %H:%M %Z' > data/last_run.txt

      - name: Commit fetch data
        if: steps.guard.outputs.run == 'yes'
        run: |
          git config user.name  "cbam-monitor-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest.json data/last_run.txt
          find data -maxdepth 1 -name '????-??-??_????.json' | xargs git add || true
          git commit -m "data: $(TZ='Asia/Taipei' date +%Y-%m-%d_%H%M) (lookback ${{ steps.lb.outputs.HOURS }}h)" || exit 0
          git pull --rebase origin main
          git push

      - name: RADAR triage
        if: steps.guard.outputs.run == 'yes'
        continue-on-error: true
        run: |
          DATE="$(TZ='Asia/Taipei' date +%F)"
          mkdir -p data/radar
          python radar/scripts/radar_process.py \
            --articles data/latest.json \
            --seen state/seen_urls.json \
            --portal-seen state/portal_seen.json \
            --outdir data/radar --date "$DATE"
          cp "data/radar/triage_${DATE}.html" data/radar/triage_latest.html || true

      - name: Commit RADAR outputs
        if: steps.guard.outputs.run == 'yes'
        run: |
          git add data/radar state/portal_seen.json
          git commit -m "radar: $(TZ='Asia/Taipei' date +%Y-%m-%d_%H%M)" || exit 0
          git pull --rebase origin main
          git push

      - name: Render RADAR digest email
        id: email
        if: steps.guard.outputs.run == 'yes'
        run: |
          DATE="$(TZ='Asia/Taipei' date +%F)"
          echo "date=$DATE" >> "$GITHUB_OUTPUT"
          # render_email.py exits 2 if candidates.json is missing or not today's (RADAR failed) → skip send
          if python radar/scripts/render_email.py \
               --candidates data/radar/candidates.json --date "$DATE" --out /tmp/radar_email.html; then
            NA=$(python -c "import json;print(len(json.load(open('data/radar/candidates.json')).get('stream_a',[])))")
            echo "send=yes" >> "$GITHUB_OUTPUT"
            echo "na=$NA" >> "$GITHUB_OUTPUT"
          else
            echo "Digest not for today — skipping email."
            echo "send=no" >> "$GITHUB_OUTPUT"
          fi

      - name: Email RADAR digest
        if: steps.guard.outputs.run == 'yes' && steps.email.outputs.send == 'yes'
        continue-on-error: true   # email is non-critical; data is already committed
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_ADDRESS }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          to: ${{ secrets.RECIPIENT_EMAIL }}
          from: "CBAM Radar <${{ secrets.GMAIL_ADDRESS }}>"
          subject: "CBAM 每日雷達 — ${{ steps.email.outputs.date }} (Stream A ${{ steps.email.outputs.na }})"
          html_body: file:///tmp/radar_email.html
          convert_markdown: false
