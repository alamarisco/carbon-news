<!doctype html><meta charset="utf-8">
<style>
 :root{font-family:-apple-system,Segoe UI,Roboto,'Noto Sans TC',sans-serif;}
 body{margin:0;color:#1a1a1a;}
 h1{font-size:18px;margin:4px 0 2px}
 .sub{color:#666;font-size:12px;margin-bottom:10px}
 .bar{position:sticky;top:0;background:#fff;padding:8px 0;border-bottom:1px solid #eee;display:flex;gap:8px;align-items:center;flex-wrap:wrap;z-index:2}
 button{border:0;border-radius:6px;padding:7px 12px;font-size:13px;cursor:pointer}
 .send{background:#1b5e20;color:#fff;font-weight:600}
 .ghost{background:#eef1ee;color:#333}
 .row{display:grid;grid-template-columns:18px 54px 1fr;grid-template-areas:'c b meta' 'c b title' 'c b sum';gap:2px 8px;padding:9px 6px;border-bottom:1px solid #f0f0f0;align-items:start}
 .row input{grid-area:c;margin-top:3px}
 .badge{grid-area:b;color:#fff;font-size:10px;font-weight:700;text-align:center;border-radius:9px;padding:2px 0;height:fit-content}
 .meta{grid-area:meta;color:#888;font-size:11px}
 .title{grid-area:title;font-weight:600;font-size:14px;color:#1a0dab;text-decoration:none}
 .sum{grid-area:sum;color:#555;font-size:12px}
 details summary{cursor:pointer;font-size:14px;font-weight:600;margin:14px 0 4px;color:#444}
 .brow{padding:6px;border-bottom:1px solid #f4f4f4;font-size:13px}
 .brow .meta{display:block}
 .brow a{color:#1a0dab;text-decoration:none}
</style>
<h1>國際新聞蒐集 — 每日雷達 __DATE__</h1>
<div class="sub">Stream A (CBAM core): __NA__ candidates · __DUP__ duplicates collapsed · TOP/HIGH pre-checked</div>
<div class="bar">
  <button class="send" onclick="send()">▶ Send selection to Claude</button>
  <button class="ghost" onclick="all(true)">Select all</button>
  <button class="ghost" onclick="all(false)">Clear</button>
  <span id="n" class="sub" style="margin:0"></span>
</div>
<div id="list">__ROWS__</div>
<details><summary>Stream B — VCM / 廣義碳市場 (__NB__ items · 研究用, 不進週報)</summary>__BROWS__</details>
<script>
 function boxes(){return [...document.querySelectorAll('#list input[type=checkbox]')];}
 function count(){document.getElementById('n').textContent = boxes().filter(b=>b.checked).length + ' selected';}
 function all(v){boxes().forEach(b=>b.checked=v);count();}
 boxes().forEach(b=>b.addEventListener('change',count)); count();
 function send(){
   var picks = boxes().filter(b=>b.checked).map(b=>'- '+b.dataset.title+' '+b.dataset.url);
   if(!picks.length){alert('No items selected');return;}
   var msg = 'RADAR picks for the CBAM weekly. For each item: translate it in the ESTC house style, give me a paste-ready Chinese LINE message, add it to the queue, and append it to this week living doc:\n'+picks.join('\n');
   if(window.sendPrompt){window.sendPrompt(msg);}else{navigator.clipboard.writeText(msg);alert('Copied selection — paste into Claude.');}
 }
</script>
